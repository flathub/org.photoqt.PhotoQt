app-id: org.photoqt.PhotoQt
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: photoqt
finish-args:
    - --share=ipc
    - --share=network
    - --socket=wayland
    - --socket=fallback-x11
    - --filesystem=host
    - --device=dri
    - --socket=pulseaudio
    - --talk-name=org.kde.StatusNotifierWatcher
cleanup:
    - /include
    - /lib/pkgconfig
    - /lib/cmake
    - /share/pkgconfig
    - /share/boost_predef
    - /share/doc
    - /share/man
    - '*.a'
modules:
    ########################
    # EXIV2
    ########################
    - name: exiv2
      buildsystem: cmake-ninja
      builddir: true
      config-opts:
        - -DCMAKE_BUILD_TYPE=Release
        - -DEXIV2_ENABLE_INIH=OFF
        - -DEXIV2_BUILD_SAMPLES=OFF
        - -DEXIV2_BUILD_EXIV2_COMMAND=OFF
        - -DEXIV2_ENABLE_BMFF=ON
      cleanup:
        - /bin
        - /share/man
      sources:
        - type: git
          url: https://github.com/Exiv2/exiv2
          commit: 2cd987a731236037b6b78cbff897d08685a8ef49
          tag: v0.28.8

    ########################
    # RAW SUPPORT
    ########################
    - name: libraw
      builddir: true
      config-opts:
        - --disable-examples
      sources:
        - type: git
          url: https://github.com/LibRaw/LibRaw
          commit: b860248a89d9082b8e0a1e202e516f46af9adb29
          tag: 0.22.1
        - type: shell
          commands:
            - "autoreconf -vfi"

    ########################
    # EXR SUPPORT
    ########################
    - name: libdeflate
      buildsystem: cmake-ninja
      config-opts:
        - -DCMAKE_BUILD_TYPE=Release
      sources:
        - type: git
          url: https://github.com/ebiggers/libdeflate
          commit: c8c56a20f8f621e6a966b716b31f1dedab6a41e3
          tag: v1.25
    ########################
    - name: imath
      buildsystem: cmake-ninja
      config-opts:
        - -DCMAKE_BUILD_TYPE=Release
      sources:
        - type: git
          url: https://github.com/AcademySoftwareFoundation/Imath
          commit: 1e480d11cb98b032a2dece9b9a8730512effc7f6
          tag: v3.2.2
    ########################
    - name: openjph
      buildsystem: cmake-ninja
      config-opts:
        - -DCMAKE_BUILD_TYPE=Release
        - -DOJPH_BUILD_EXECUTABLES=OFF
      sources:
        - type: git
          url: https://github.com/aous72/OpenJPH
          commit: 1ce857c7f14dd78dd8f4bdfabe43dc17f8408a42
          tag: 0.30 .1
    ########################
    - name: openexr
      buildsystem: cmake-ninja
      config-opts:
        - -DCMAKE_BUILD_TYPE=Release
      sources:
        - type: git
          url: https://github.com/AcademySoftwareFoundation/openexr
          commit: c1194b2cb23a1bdf76fe5e756b22e8436b9a98c9
          tag: v3.4.13

    ########################
    # POPPLER DOCUMENTS
    ########################
    - name: poppler-data
      buildsystem: cmake-ninja
      builddir: true
      config-opts:
        - -DCMAKE_BUILD_TYPE=Release
      sources:
        - type: git
          url: https://gitlab.freedesktop.org/poppler/poppler-data
          commit: af9f452b427d5ce8abe81ff98cc40c5f39fad90b
          tag: POPPLER_DATA_0_4_12
    ########################
    - name: boost
      buildsystem: simple
      cleanup:
        - "libboost*.so*"
      build-commands:
        - ./bootstrap.sh --with-libraries=container
        - ./b2 install variant=release link=shared runtime-link=shared --prefix="$FLATPAK_DEST" -j $FLATPAK_BUILDER_N_JOBS
      sources:
        - type: archive
          url: https://archives.boost.io/release/1.91.0/source/boost_1_91_0.tar.gz
          sha256: 5734305f40a76c30f951c9abd409a45a2a19fb546efe4162119250bbe4d3a463
    ########################
    - name: poppler
      buildsystem: cmake-ninja
      config-opts:
        - -DCMAKE_BUILD_TYPE=Release
        - -DENABLE_GOBJECT_INTROSPECTION=OFF
        - -DENABLE_LIBOPENJPEG=openjpeg2
        - -DBUILD_GTK_TESTS=OFF
        - -DBUILD_QT5_TESTS=OFF
        - -DBUILD_QT6_TESTS=OFF
        - -DENABLE_QT5=OFF
        - -DENABLE_QT6=ON
        - -DBUILD_CPP_TESTS=OFF
        - -DENABLE_UTILS=ON
        - -DENABLE_BOOST=ON
      sources:
        - type: git
          url: https://gitlab.freedesktop.org/poppler/poppler
          commit: 1fe40984214a729350da11950fc7f09343247202
          tag: poppler-26.06.0

    ########################
    # ffmpegthumbnailer
    ########################
    - name: ffmpegthumbnailer
      buildsystem: cmake-ninja
      config-opts:
        - -DCMAKE_BUILD_TYPE=Release
        - -DENABLE_TESTS=OFF
      sources:
        - type: git
          url: https://github.com/dirkvdb/ffmpegthumbnailer
          commit: cfaf0c5018aec14e5ecbb687d40b090c2a6a14bd
          tag: v2.3.0

    ########################
    # MPV SUPPORT
    ########################
    - name: glslang
      buildsystem: cmake-ninja
      config-opts:
        - -DCMAKE_BUILD_TYPE=Release
        - -DGLSLANG_TESTS=OFF
        - -DENABLE_OPT=OFF
      sources:
        - type: git
          url: https://github.com/KhronosGroup/glslang
          commit: 275822a6261ee689aadb1da5f09a0ec2f058685c
          tag: 16.3.0
    ########################
    - name: libplacebo
      buildsystem: meson
      config-opts:
        - -Dtests=false
        - -Dvulkan=enabled
        - -Dglslang=enabled
        - -Dlcms=enabled
        - -Dd3d11=disabled
        - -Ddemos=false
      sources:
        - type: git
          url: https://github.com/haasn/libplacebo
          commit: cee9b076f2c63104ccfd497fa79c39a867293ec4
          tag: v7.360.1
    ########################
    - name: libass
      buildsystem: autotools
      sources:
        - type: git
          url: https://github.com/libass/libass
          commit: 4a05d8127f525943ebf45fdc6497c9e665947f0d
          tag: 0.17.5
    ########################
    - name: libmpv
      buildsystem: meson
      config-opts:
        - -Dlibmpv=true
        - -Dcaca=disabled
        - -Dcdda=disabled
        - -Ddvbin=disabled
        - -Ddvdnav=disabled
        - -Dlibarchive=disabled
        - -Dopenal=disabled
      sources:
        - type: git
          url: https://github.com/mpv-player/mpv
          commit: 41f6a645068483470267271e1d09966ca3b9f413
          tag: v0.41.0

    ########################
    # MAGICK HAPPENS HERE
    ########################
    - name: ghostscript
      build-options:
        cflags: -std=gnu18
      config-opts:
        - --enable-shared
        - --disable-static
      sources:
        - type: archive
          url: https://github.com/ArtifexSoftware/ghostpdl-downloads/releases/download/gs10071/ghostscript-10.07.1.tar.gz
          sha256: 2fc74362f9be6fae1b0a65d38fdcfd4f0b518cc3b07c5581fb661eb4d2e15251
    ########################
    - name: imagemagick
      builddir: true
      config-opts:
        - --enable-shared
        - --disable-static
        - --disable-docs
        - --with-modules
        - --with-threads
        - --with-png
        - --enable-hdri
        - --enable-opencl
        - --with-djvu
        - --with-fftw
        - --with-jxl
        - --with-lqr
        - --with-modules
        - --with-openexr
        - --with-openjp2
        - --with-rsvg
        - --with-webp
        - --with-wmf
        - --with-xml
        - --with-dps
        - --with-fpx
        - --with-gvc
      sources:
        - type: git
          url: https://github.com/ImageMagick/ImageMagick
          commit: 38ba210c5e5a660013d632a3d33c431e658befcc
          tag: 7.1.2-26

    ########################
    # ZXING-CPP
    ########################
    - name: stb
      buildsystem: simple
      build-commands:
        - mkdir /app/include/stb
        - cp *.h /app/include/stb
      sources:
        - type: git
          url: https://github.com/nothings/stb
          commit: 31c1ad37456438565541f4919958214b6e762fb4
    - name: zxing-cpp
      buildsystem: cmake-ninja
      config-opts:
        - -DCMAKE_BUILD_TYPE=Release
        - -DZXING_WRITERS=OFF
        - -DZXING_EXAMPLES=OFF
        - -DSTB_IMAGE_INCLUDE_DIR=/app/include/stb/
      sources:
        - type: git
          url: https://github.com/zxing-cpp/zxing-cpp
          commit: 8dd1cf5c4fd6fb6211bb96713db926ac6f2cf825
          tag: v3.0.2
        - type: patch
          path: patches/zxing-cmake.patch


    ########################
    # EXTENSIONS
    ########################
    - name: yaml-cpp
      buildsystem: cmake-ninja
      builddir: true
      sources:
        - type: git
          url: https://github.com/jbeder/yaml-cpp
          commit: 56e3bb550c91fd7005566f19c079cb7a503223cf
          tag: yaml-cpp-0.9.0
        - type: patch
          path: patches/yaml-cpp-fix-uint16.patch
    - name: photoqt-extensions
      buildsystem: cmake-ninja
      builddir: true
      config-opts:
        - -DWITH_EXIV2=ON
        - -DCMAKE_INSTALL_PREFIX=/app/lib/PhotoQt/extensions
        - -DINSTALL_INTO_LIB_SUBDIR=OFF
      sources:
        - type: git
          url: https://gitlab.com/lspies/photoqt-extensions.git
          commit: 83ed295fa28e2a6983ec1863563b962aea8b576e
          tag: v5.4

    ########################
    ########################
    - name: photoqt
      buildsystem: cmake-ninja
      builddir: true
      config-opts:
        - -DWITH_IMAGEMAGICK=ON
        - -DWITH_GRAPHICSMAGICK=OFF
        - -DWITH_EXIV2=ON
        - -DWITH_LIBARCHIVE=ON
        - -DWITH_LIBRAW=ON
        - -DWITH_POPPLER=ON
        - -DWITH_QTPDF=OFF
        - -DWITH_DEVIL=OFF
        - -DWITH_PUGIXML=OFF
        - -DWITH_CHROMECAST=OFF
        - -DWITH_LIBVIPS=OFF
        - -DWITH_VIDEO_MPV=ON
        - -DWITH_EXIV2_ENABLE_BMFF=ON
        - -DWITH_ZXING=ON
        - -DWITH_FLATPAKBUILD=ON
        - -DWITH_WAYLANDSPECIFIC=ON
        - -DWITH_EXTENSIONS_SUPPORT=ON
        - -DWITH_LIBSAI=OFF
        - -DWITH_FFMPEGTHUMBNAILER=ON
      sources:
        - type: git
          url: https://gitlab.com/lspies/photoqt.git
          commit: c46ce9eae600b292c7f3cba6f90d6cab5eae98ad
          tag: v5.4
